{% extends "base.html" %}

{% block content %}

<div class="m-4 container-sm">
  <h2>Реєстрація</h2>

  {% if error %}
    <div class="alert alert-danger" role="alert">
      {{ error }}
    </div>
  {% endif %}

  <form method="post" action="{{ url_for('user_register') }}">
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Електронна пошта</label>
      <input name="email" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required value="{{ email }}" placeholder="email@example.com">
      <div id="emailHelp" class="form-text">Ми ніколи не передаємо вашу пошту третім особам.</div>
    </div>

    <div class="mb-3">
      <label for="exampleInputUser1" class="form-label">Ім'я користувача</label>
      <input name="username" type="text" class="form-control" id="exampleInputUserName" required minlength="3" value="{{ username }}" placeholder="Ваш нікнейм">
    </div>

    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Пароль</label>
      <input name="password" type="password" class="form-control" id="exampleInputPassword1" required placeholder="Ваш пароль">
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Зареєструватися</button>
      <a class="btn btn-dark" href="{{ url_for('index') }}">Назад</a>
    </div>
  </form>
</div>

{% endblock %}
