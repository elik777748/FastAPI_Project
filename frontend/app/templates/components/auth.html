{% if user %}

    <a
            type="button"        class="btn btn-primary"        href="{{ url_for('logout') }}">
        Вийти
    </a>
{% else %}
    <a
            type="button"        class="btn btn-primary"        href="{{ url_for('user_register') }}">
        Зареєструватися
    </a>
    <a
            type="button"        class="btn btn-primary  ms-2"        href="{{ url_for('login') }}">
        Логін
    </a>
{% endif %}
